<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da memória com sons: Pantanal</title>
    <link rel="stylesheet" href="style.css">
    <script src="jogo.js"></script>
</head>
<body>
    <h1>Jogo da memória com sons: Pantanal</h1>
    <div class="caixa-pontuacao"> 
        <p>Pontuação: <span id="pontuacao">0</span></p>
        <p id="timer" style="display:none;">Tempo: <span id="tempo-restante">60</span>s</p>
    </div>

    <div id="tela-inicial">
        <h2>Conheça os Sons dos Animais do Pantanal</h2>
        <div id="animais-conheca"></div>
        <div class="opcoes-jogo">
            <button id="btn-normal">Iniciar Jogo Normal</button>
            <button id="btn-tempo">Iniciar Jogo por Tempo</button>
        </div>
    </div>

    <main id="area-jogo">

    </main>
</body>
</html>
